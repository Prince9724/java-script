<body>
    
    <script>
        //Write a function that takes an array and returns the largest number in the array.
        const arr = [1,2,3,4,5,16,17,8,9,110];
        function largest (){
             let max = arr[0];
            for(let i = 0; i<=arr.length;i++){
                for(let j = i+1;j<arr.length;j++){
                       if(max<arr[j]){
                        max = arr[j];                         
                       } 
                }
            }   
            return max;         
        }
        let ans = largest(arr);
        document.writeln(ans);

    </script>
</body>
