<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title> Counter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body style="height: 100vh;">
    <div class="bg-blur"></div>
    <div class="cursor"></div>
    <div class="cursor-blur"></div>
    <div class="container h-100 d-flex justify-content-center align-items-center flex-column">
            <h1 class="counter">Counter App</h1>
        <h1 id="count"> 0</h1>
        <div>
            <button id="button1" class="btn1">++</button>
            <button id="button2" class="btn2">--</button>
            <button id="button-reset" class="btn3">Reset</button>
            <button id="button-into" class="btn4">* 2</button>
            <button id="button-module" class="btn4"> %2</button>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
