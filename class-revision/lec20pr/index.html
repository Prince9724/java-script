<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
</head>

<body style="height: 100vh;">
    <div class="container h-100 d-flex justify-content-center flex-column align-items-center">
            <h2 class="text-center">Quotes</h2>
        <div class=" border border-2 p-3 bg-white ">
            <div class="card position-relative overflow-hidden" style="height: 400px; width: 600px;">

            <img id="quote-img" class="w-100 h-100 object-fit-cover position-absolute top-0 start-0" />

            <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50"></div>
            <div class="position-relative text-white p-4 h-100 d-flex flex-column justify-content-center">
                <p id="qoutes" class="fs-3 w-100 p-5 fw-bold text-center"></p>
                <p id="author" class="fs-5 w-100 p-5 text-end mt-3"></p>
            </div>

        </div>
        <div class="d-flex justify-content-center mt-5">
            <button id="btn-prev" class="btn btn-outline-primary ">Previous</button>
            <button id="btn-like" class="like btn btn-secondary mx-3">❤️</button>
            <button id="btn-next" class="btn btn-secondary">Next</button>
             <a class="btn btn-outline-success ms-5" href="fav.html">Favroit</a>
        </div>
        </div>
       
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
