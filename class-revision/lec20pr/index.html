<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
  <body style="height: 100vh;">
        <div class="container h-100 d-flex justify-content-center align-items-center">
           <div class="card">
             <div>
                <div class="p-5">
                    <p id="qoutes" class="fs-2 fw-bold text-center">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Dolorem, magni.</p>
                    <p id="author" class="fs-5 fw-medium">Author</p>
                </div>
            </div>
            <div class="d-flex justify-content-center">
                <button id="btn-pre" class="btn btn-secondary">+</button>
                <button id="btn-like" class="btn btn-secondary mx-3">❤️</button>
                <button id="btn-next" class="btn btn-secondary">--</button>
            </div>
           </div>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
