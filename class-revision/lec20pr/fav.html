<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Favroit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
      <div class="container-fluid">
        <div class="container ">
            <div>
              <h2>Favroit List</h2>
              <a href="index.html" class="btn btn-outline-success">Back</a>
            </div>
            <div id="Favlist" class="d-flex flex-wrap justify-content-center">
              
              
            </div>
        </div>
      </div>    
    
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
      const Favlist = document.getElementById("Favlist")
      const button = document.getElementById("Remove");
      const quate = document.getElementById("quote");
      const author = document.getElementById("author");

      const favdisplay =()=>{

       const favQuates = JSON.parse(localStorage.getItem("favlist"))
          Favlist.innerHTML=" ";

        favQuates.map((favroit,i)=>{
          const div = document.createElement("div");
          div.innerHTML=`<div class="shadow w-100 border border-3 rounded-5 p-3 mt-3 ">
                 <p id="quote" class="fw-bold fs-3">${favroit.quote}</p>
                <div class="d-flex justify-content-between">
                  <p id="author" class="fs-5">${favroit.author} </p>
                  <button id="Remove" onclick ="remove(${i})" class="btn btn-outline-danger">Remove</button>
                </div> 
              </div>`;
              Favlist.appendChild(div);
        })
      
      }
    const remove =(i)=>{
      const arr = JSON.parse(localStorage.getItem("favlist"));
      arr.splice(i,1);
      localStorage.setItem("favlist",JSON.stringify(arr));
      favdisplay();
      alert("Quate is remove From favroite List")

    }
      favdisplay();


    </script>
  </body>
</html>
