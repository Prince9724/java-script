<body>
    
    <script>
        //Write a function that counts how many even numbers are present in an array.
        const arr = [1, 2, 3, 112,4, 5, 16, 17, 8, 9, 110];
        function counter(){
            let count = 0;
            for(let i=0;i<arr.length;i++){

                if(arr[i]%2==0){
                    document.writeln( arr[i]);
                    count++;
                }
            }
            return count;
        }
        let ans = counter(arr);
        document.writeln("<br>  even count - ",ans);
    </script>
