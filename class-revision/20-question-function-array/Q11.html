<body>
    <script>
        //Write a function that removes duplicate elements from an array.
            const arr = [1,1,2,2,3,4,5,6,7,4,7,8,1,9]
            function duplicate (){
                for(let i =0; i<arr.length;i++){
                    for(let j = i+1;j<arr.length;j++){
                        if(arr[i]==arr[j]){
                             arr.splice(j,1);
                        }
                    
                    }
                }
                return arr;                
            }
            let ans = duplicate(arr);
            document.writeln(ans);  



        
   </script>
