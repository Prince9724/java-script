<body>

    <script>
        //Write a function that takes an array and returns a new array with all elements doubled.
        const arr = [1, 2, 3, 4, 5, 16, 17, 8, 9, 110];
        function doubled() {
             let d = arr.map(e=> e*2);
             return d; 
        }
        let ans = doubled(arr);
        document.writeln(ans);

    </script>
