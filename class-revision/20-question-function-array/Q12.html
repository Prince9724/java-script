<body>
    
    <script>
        //Write a function that takes an array of numbers and returns the square of each element.
            const arr = [1,1,2,2,3,4,5,6,7,4,7,8,9]
        function square (arr){
           const num = arr.map(e=> e**2);

            return num;
        }
        const ans = square(arr);
        document.writeln(ans);

    </script>
    <!-- //16 8 8 8 10 17 5 -->
