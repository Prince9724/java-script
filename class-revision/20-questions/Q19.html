<body>
    
    <script>

        // Write a JavaScript program to decrement a number using the decrement operator.
        let num = 123; 
        document.writeln("before decrement : ",num +"<br>");
        num--;
        document.writeln("after decrement : ",num --);
    </script>
</body>
